<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Premium Scroll Hero</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="hero">

  <!-- Background Layer -->
  <div class="bg-layer"></div>

  <!-- Content -->
  <div class="hero-content">
    <h1 class="headline">
      <span>W</span><span>E</span><span>L</span><span>C</span><span>O</span><span>M</span><span>E</span>
      <span>&nbsp;</span>
      <span>I</span><span>T</span><span>Z</span>
      <span>F</span><span>I</span><span>Z</span><span>Z</span>
    </h1>

    <div class="stats">
      <div class="stat">
        <h2 class="counter" data-target="95">0</h2>
        <p>Client Satisfaction</p>
      </div>

      <div class="stat">
        <h2 class="counter" data-target="120">0</h2>
        <p>Projects Delivered</p>
      </div>

      <div class="stat">
        <h2 class="counter" data-target="4">0</h2>
        <p>Growth Rate</p>
      </div>
    </div>
  </div>

  <!-- Foreground Image -->
  <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70"
       class="hero-image" />

</section>

<section class="spacer"></section>

<script src="script.js"></script>
</body>
</html>
